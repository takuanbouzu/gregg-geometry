<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

const gsap = window.gsap;
const PAL = GF_SCENE.active();
const COL = { unit:PAL.unit, face:PAL.face, space:PAL.space, angle:PAL.angle, green:PAL.tri };
const CSS = { unit:PAL.unit, face:PAL.face, space:PAL.space, angle:PAL.angle };
GF_SCENE.onChange(GF_SCENE.reload);

/* ---------- renderer / scene ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(26,1,0.01,100);

/* camera rig: gimbal-free quarter orbit via pivot.rotation.x (-90deg top -> 0deg front) */
const pivot = new THREE.Group(); scene.add(pivot); pivot.add(camera);
const CAM0 = { rx:-Math.PI/2, ry:0, R:6.8, tx:1.20, ty:0, tz:0.80 };
const cam = Object.assign({}, CAM0);

const mats=[]; // LineMaterials needing resolution
function applyCam(){
  pivot.position.set(cam.tx,cam.ty,cam.tz);
  pivot.rotation.set(cam.rx,cam.ry,0);
  camera.position.set(0,0,cam.R);
  camera.rotation.set(0,0,0);
}
function resize(){
  const w=canvas.clientWidth, h=canvas.clientHeight; if(!w||!h) return;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
  const px=renderer.getPixelRatio();
  mats.forEach(m=>m.resolution.set(w*px,h*px));
}
new ResizeObserver(resize).observe(canvas);

/* ---------- helpers ---------- */
// fat line that can "draw on". pts = array of [x,y,z]
function fatLine(pts, color, width, opacity, depthTest, order){
  const geo=new LineGeometry(); geo.setPositions([pts[0][0],pts[0][1],pts[0][2],pts[0][0],pts[0][1],pts[0][2]]);
  const mat=new LineMaterial({color,linewidth:width,transparent:true,opacity:(opacity==null?1:opacity)});
  mat.worldUnits=false; mat.depthTest=(depthTest!==false); mats.push(mat);
  const line=new Line2(geo,mat); line.renderOrder=order||0; scene.add(line);
  const o={line,geo,mat,pts};
  o.set=function(p){
    p=Math.max(0,Math.min(1,p)); let arr;
    if(p<=0.0001){ const a=pts[0]; arr=[a[0],a[1],a[2],a[0],a[1],a[2]]; }
    else if(pts.length===2){ const a=pts[0],b=pts[1];
      const e=[a[0]+(b[0]-a[0])*p,a[1]+(b[1]-a[1])*p,a[2]+(b[2]-a[2])*p]; arr=[a[0],a[1],a[2],e[0],e[1],e[2]]; }
    else { const n=Math.max(2,Math.ceil(p*(pts.length-1))+1); const s=pts.slice(0,n);
      arr=[]; s.forEach(q=>arr.push(q[0],q[1],q[2])); }
    o.geo.setPositions(arr);
  };
  o.set(0); return o;
}
function tri(a,b,c,color,opacity,order){
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([...a,...b,...c]),3));
  g.setIndex([0,1,2]); g.computeVertexNormals();
  const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false,depthTest:false});
  const mesh=new THREE.Mesh(g,m); mesh.renderOrder=order||5; mesh.userData.target=opacity; scene.add(mesh); return mesh;
}
function quad(a,b,c,d,color,opacity,order){ // two triangles, returns group of meshes
  return [tri(a,b,c,color,opacity,order),tri(a,c,d,color,opacity,order)];
}
function label(text,pos,colorCss,scale){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=170;
  const ctx=cv.getContext('2d'); ctx.font='700 96px "Space Mono", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineWidth=12; ctx.strokeStyle=PAL.halo; ctx.strokeText(text,256,90);
  ctx.fillStyle=colorCss; ctx.fillText(text,256,90);
  const tex=new THREE.CanvasTexture(cv); tex.anisotropy=4;
  const m=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0,depthTest:false});
  const sp=new THREE.Sprite(m); sp.position.set(pos[0],pos[1],pos[2]);
  sp.scale.set(scale*3.0,scale,1); sp.renderOrder=40; scene.add(sp); return sp;
}

/* ---------- PHASE 1 geometry : flat plan (measured artwork mapped to ground y=0) ---------- */
const k=1/287, X0=159, Y0=264;                 // 2D px -> world; unit square side(287px)=1
const m2=(px,py)=>[(px-X0)*k, 0, (py-Y0)*k];
const ringPts=(cx,cy,r,n=160)=>{const a=[];for(let i=0;i<=n;i++){const t=i/n*Math.PI*2;a.push(m2(cx+r*Math.cos(t),cy+r*Math.sin(t)));}return a;};

// measured artwork
const SQ={tl:[159,264],tr:[446,264],br:[446,507],bl:[159,507]};
const CIR=[[298,387,185],[409,552,195],[703,482,193]];
const BLUE={top:[444,351],left:[166,555],bottom:[447,753],right:[725,549]};
const WHITE=[[444,351],[166,555],[444,552]];
const MAG={a:[453,360],apex:[848,387],b:[617,715]};

const p1lines=[], p1fills=[], p1labels=[];
// circles
const circ = CIR.map(c=>fatLine(ringPts(c[0],c[1],c[2]),COL.unit,2.0,0.40,false,2));
p1lines.push(...circ);
// square + diagonals
const sqE=[ fatLine([m2(...SQ.tl),m2(...SQ.tr)],COL.unit,3,1,false,8),
           fatLine([m2(...SQ.tr),m2(...SQ.br)],COL.unit,3,1,false,8),
           fatLine([m2(...SQ.br),m2(...SQ.bl)],COL.unit,3,1,false,8),
           fatLine([m2(...SQ.bl),m2(...SQ.tl)],COL.unit,3,1,false,8) ];
const sqD=[ fatLine([m2(...SQ.tl),m2(...SQ.br)],COL.face,2.4,0.9,false,8),
           fatLine([m2(...SQ.tr),m2(...SQ.bl)],COL.face,2.4,0.9,false,8) ];
p1lines.push(...sqE,...sqD);
// blue fold fill + white half + outline
const blueFill=quad(m2(...BLUE.top),m2(...BLUE.right),m2(...BLUE.bottom),m2(...BLUE.left),COL.face,0.85,5);
const whiteFill=[tri(m2(...WHITE[0]),m2(...WHITE[1]),m2(...WHITE[2]),COL.unit,1,6)];
p1fills.push(...blueFill,...whiteFill);
const blueE=[ fatLine([m2(...BLUE.top),m2(...BLUE.right)],COL.unit,2.0,0.8,false,9),
             fatLine([m2(...BLUE.right),m2(...BLUE.bottom)],COL.unit,2.0,0.8,false,9),
             fatLine([m2(...BLUE.bottom),m2(...BLUE.left)],COL.unit,2.0,0.8,false,9),
             fatLine([m2(...BLUE.left),m2(...BLUE.top)],COL.unit,2.0,0.8,false,9),
             fatLine([m2(...BLUE.top),m2(...BLUE.bottom)],COL.unit,1.8,0.6,false,9) ];
p1lines.push(...blueE);
// magenta lost triangle fill + outline + divider
const magFill=[tri(m2(...MAG.a),m2(...MAG.apex),m2(...MAG.b),COL.space,0.9,5)];
p1fills.push(...magFill);
const magE=[ fatLine([m2(...MAG.a),m2(...MAG.apex)],COL.unit,2.4,0.85,false,9),
            fatLine([m2(...MAG.apex),m2(...MAG.b)],COL.unit,2.4,0.85,false,9),
            fatLine([m2(...MAG.b),m2(...MAG.a)],COL.unit,2.4,0.85,false,9),
            fatLine([m2(848,387),m2(535,537)],COL.unit,1.7,0.6,false,9) ];
p1lines.push(...magE);
// a couple of plan labels
const L1p=label('1',m2(300,238),CSS.unit,0.16); const L2p=label('√2',m2(250,400),CSS.face,0.18);
const L3p=label('√3',m2(690,520),CSS.space,0.20); p1labels.push(L1p,L2p,L3p);

const p1all=[...p1lines,...p1fills,...p1labels];

/* ---------- PHASE 3 geometry : true 3D cube construction (y-up, unit=1) ---------- */
const O=[0,0,0],X=[1,0,0],Zp=[0,0,1],A=[1,0,1],B=[1,1,1];
const O2=[0,1,0],X2=[1,1,0],Z2=[0,1,1];
// ghost cube edges
const ghostDefs=[[O,X],[X,A],[A,Zp],[Zp,O],[O2,X2],[X2,B],[B,Z2],[Z2,O2],[O,O2],[X,X2],[A,B],[Zp,Z2]];
const ghost=ghostDefs.map(e=>{const o=fatLine(e,COL.unit,1.4,0.0,true,0);o.set(1);return o;});
// base square (prominent)
const base=[ fatLine([O,X],COL.unit,3,0,true,1), fatLine([X,A],COL.unit,3,0,true,1),
            fatLine([A,Zp],COL.unit,3,0,true,1), fatLine([Zp,O],COL.unit,3,0,true,1) ];
// face diagonal sqrt2 (blue), vertical lift (bone), space diagonal sqrt3 (magenta)
const faceDiag=fatLine([O,A],COL.face,3.2,0,true,2);
const lift=fatLine([A,B],COL.unit,3,0,true,2);
const spaceDiag=fatLine([O,B],COL.space,3.6,0,true,3);
// proof triangle fill O-A-B
const proofTri=tri(O,A,B,COL.green,0.16,4);
// right-angle marker at A and 35.264 arc at O
const ao=new THREE.Vector3(O[0]-A[0],O[1]-A[1],O[2]-A[2]).normalize();
const ab=new THREE.Vector3(0,1,0); const s=0.13;
const ra=[ [A[0]+ao.x*s,A[1]+ao.y*s,A[2]+ao.z*s],
           [A[0]+ao.x*s+ab.x*s,A[1]+ao.y*s+ab.y*s,A[2]+ao.z*s+ab.z*s],
           [A[0]+ab.x*s,A[1]+ab.y*s,A[2]+ab.z*s] ];
const rightAngle=fatLine(ra,COL.unit,1.8,0,true,3);
const uOA=new THREE.Vector3(...A).normalize(), uOB=new THREE.Vector3(...B).normalize();
const arcPts=[]; for(let i=0;i<=40;i++){const t=i/40;const d=new THREE.Vector3().lerpVectors(uOA,uOB,t).normalize().multiplyScalar(0.34);arcPts.push([d.x,d.y,d.z]);}
const arc=fatLine(arcPts,COL.angle,2.0,0,true,3);
// 3D labels
const L1=label('1',[1.12,0.5,1.06],CSS.unit,0.16);
const L2=label('√2',[0.5,-0.07,0.5],CSS.face,0.18);
const L3=label('√3',[0.40,0.52,0.52],CSS.space,0.20);
const Lang=label('35.26°',[0.55,0.16,0.18],CSS.angle,0.12);
const p3lines=[...ghost,...base,faceDiag,lift,spaceDiag,rightAngle,arc];
const p3labels=[L1,L2,L3,Lang];

/* ---------- captions ---------- */
const cap=document.getElementById('caption');
function setCap(html){ cap.style.opacity=0; setTimeout(()=>{cap.innerHTML=html; cap.style.opacity=1;},170); }

/* ---------- master timeline ---------- */
const playBtn=document.getElementById('play'), pauseBtn=document.getElementById('pause'),
      scrub=document.getElementById('scrub'), speed=document.getElementById('speed');
let scrubbing=false, done=false;
const tl=gsap.timeline({paused:true,
  onUpdate:()=>{ if(!scrubbing) scrub.value=Math.round(tl.progress()*1000); },
  onComplete:()=>{ playBtn.textContent='Replay'; done=true; }});

const drawTo=(o,d,pos)=>{ const px={p:0}; o.set(0);
  return tl.to(px,{p:1,duration:d,ease:'power1.inOut',onUpdate:()=>o.set(px.p)},pos); };
const matOf=(o)=> o.mat ? o.mat : o.material;                 // fatLine wrapper OR mesh/sprite
const fadeIn=(o,d,pos,to)=> tl.to(matOf(o),{opacity:(to==null?(o.userData&&o.userData.target)||1:to),duration:d},pos);
const fadeOut=(o,d,pos)=> tl.to(matOf(o),{opacity:0,duration:d},pos);

// reset camera at playhead 0 so Replay always starts from the top-down plan
tl.set(cam,{rx:CAM0.rx,ry:CAM0.ry,R:CAM0.R,tx:CAM0.tx,ty:CAM0.ty,tz:CAM0.tz},0);

/* PHASE 1 — flat plan */
tl.add(()=>setCap('Three construction circles · <b>R = 1 : √2 : √3</b>'),0);
circ.forEach((c,i)=>drawTo(c,0.7,0.05+i*0.26));
tl.add(()=>setCap('The module · <b>unit square, edge = 1</b>'),'>-0.1');
sqE.forEach((e,i)=>drawTo(e,0.40,'>'+(i?-0.28:0)));
fadeIn(L1p,0.4,'>-0.2',1);
tl.add(()=>setCap('Fold the diagonal · <b>√2 — the face diagonal</b>'),'>-0.05');
sqD.forEach((d,i)=>drawTo(d,0.5,'>'+(i?-0.42:0)));
tl.add('blue','>-0.05');
blueE.forEach((e,i)=>drawTo(e,0.38,'blue+='+(i*0.14)));
blueFill.forEach(m=>fadeIn(m,0.8,'blue+=0.3'));
whiteFill.forEach(m=>fadeIn(m,0.6,'blue+=0.5'));
fadeIn(L2p,0.4,'blue+=0.5',1);
tl.add(()=>setCap('Lift one unit · <b>√3 — the cube’s Lost Triangle</b>'),'>-0.05');
tl.add('mag','>-0.05');
magE.forEach((e,i)=>drawTo(e,0.46,'mag+='+(i*0.18)));
magFill.forEach(m=>fadeIn(m,0.9,'mag+=0.4'));
fadeIn(L3p,0.45,'mag+=0.6',1);
tl.to({},{duration:0.8}); // hold

/* PHASE 2 — vertical quarter orbit (top -> front), fade the flat plan */
tl.addLabel('orbit');
tl.add(()=>setCap('Rotate to eye level · <b>plan → space</b>'),'orbit');
tl.to(cam,{rx:0,duration:3.0,ease:'power2.inOut'},'orbit');           // pure vertical quarter orbit
tl.to(cam,{tx:0.5,ty:0.45,tz:0.5,R:4.6,duration:3.0,ease:'power2.inOut'},'orbit');
p1all.forEach(o=>fadeOut(o,1.6,'orbit+=0.7'));

/* PHASE 3 — redraw in 3D */
tl.addLabel('d3','orbit+=2.7');
tl.to(cam,{ry:-0.5,duration:2.4,ease:'power2.inOut'},'d3');           // gentle settle for depth
tl.add(()=>setCap('Redraw in space · <b>unit cube base</b>'),'d3');
base.forEach((e,i)=>drawTo(e,0.45,'d3+='+(i*0.16)));
ghost.forEach(g=>fadeIn(g,1.0,'d3+=0.2',0.16));
tl.add(()=>setCap('Face diagonal · <b>1² + 1² = 2 → √2</b>'),'>-0.1');
drawTo(faceDiag,0.7,'>'); fadeIn(L2,0.4,'>-0.2',1);
tl.add(()=>setCap('Lift one unit edge · <b>vertical = 1</b>'),'>+0.05');
drawTo(lift,0.6,'>'); fadeIn(L1,0.4,'>-0.2',1);
tl.add(()=>setCap('Space diagonal · <b>(√2)² + 1² = 3 → √3</b>'),'>+0.05');
drawTo(spaceDiag,0.9,'>'); fadeIn(L3,0.45,'>-0.3',1);
fadeIn(proofTri,0.9,'>-0.4');
tl.add(()=>setCap('Right angle at the lift · <b>θ = 35.264°</b>'),'>-0.1');
drawTo(rightAngle,0.4,'>'); drawTo(arc,0.6,'>-0.1'); fadeIn(Lang,0.4,'>-0.1',1);
tl.add(()=>setCap('<b>1 : √2 : √3</b> — the cube’s Lost Triangle'),'>+0.3');
tl.to({},{duration:1.0});

/* ---------- controls ---------- */
function syncFromScrub(v){ tl.pause(); tl.progress(v); pauseBtn.textContent='Resume'; }
playBtn.onclick=()=>{ done=false; tl.timeScale(+speed.value);
  if(tl.progress()>=1||tl.progress()===0) tl.restart(); else tl.play();
  playBtn.textContent='Replay'; pauseBtn.textContent='Pause'; };
pauseBtn.onclick=()=>{ if(tl.paused()){tl.play();pauseBtn.textContent='Pause';}
  else{tl.pause();pauseBtn.textContent='Resume';} };
scrub.addEventListener('input',()=>{scrubbing=true;syncFromScrub(scrub.value/1000);});
scrub.addEventListener('change',()=>{scrubbing=false;});
speed.onchange=()=>tl.timeScale(+speed.value);

/* ---------- clean mode ---------- */
if(new URLSearchParams(location.search).get('clean')==='1') document.body.classList.add('clean');

/* ---------- render loop ---------- */
function loop(){
  requestAnimationFrame(loop);
  if(done) cam.ry -= 0.0016;          // slow idle orbit after completion
  applyCam();
  renderer.render(scene,camera);
}
resize(); applyCam(); loop();
const start=()=>{ tl.timeScale(+speed.value).play(); };
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(start,250)); }
else setTimeout(start,400);
</script>
