<!-- @dsCard group="Components" name="Card list" subtitle="Thumbnail + title + subtitle rows" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GF · Card list</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Cormorant+Garamond:ital@1&family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../gf-tokens.css">
<style>
  body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--font-ui);padding:48px;}
  .wrap{max-width:520px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--tx-faint);margin:0 0 16px;}
  .ico{width:34px;height:34px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="lbl">Topic list</div>
    <div class="gf-cardlist">
      <a class="gf-card" href="#">
        <div class="gf-card-thumb"><svg class="ico" viewBox="0 0 64 64"><polygon points="32,5 58,19 58,45 32,59 6,45 6,19" fill="none" stroke="var(--geo-angle)" stroke-width="2"/></svg></div>
        <div class="gf-card-body"><div class="gf-card-title">The Lost Triangle</div><div class="gf-card-sub">1 : √2 : √3 — the root triangle</div></div>
      </a>
      <a class="gf-card" href="#">
        <div class="gf-card-thumb"><svg class="ico" viewBox="0 0 64 64"><rect x="12" y="12" width="40" height="40" fill="none" stroke="var(--geo-face)" stroke-width="2" transform="rotate(45 32 32)"/></svg></div>
        <div class="gf-card-body"><div class="gf-card-title">Rhombic System</div><div class="gf-card-sub">Twelve √2 faces that tile space</div></div>
      </a>
      <a class="gf-card" href="#">
        <div class="gf-card-thumb"><svg class="ico" viewBox="0 0 64 64"><circle cx="32" cy="32" r="22" fill="none" stroke="var(--geo-tri)" stroke-width="2"/><circle cx="32" cy="32" r="11" fill="none" stroke="var(--tx-dim)" stroke-width="1.4"/></svg></div>
        <div class="gf-card-body"><div class="gf-card-title">Truncated Rhombicube</div><div class="gf-card-sub">Cut the corners — 26 faces</div></div>
      </a>
    </div>
  </div>
</body>
</html>
