<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* tokens (--bg/--tx/--geo-*/fonts/--ease/etc.) now come from gf-tokens.css, themeable.
     Only --ring (construction circles) is page-local — keep it theme-aware here. */
  :root{ --ring:rgba(240,237,232,.42); }                 /* dark: faint bone */
  :root[data-theme="light"]{ --ring:rgba(20,20,20,.30); } /* light: faint ink */
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--tx); font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
    min-height:100vh;
  }
  header{
    padding:22px 28px 10px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  header .brand{
    font-family:var(--font-display); font-weight:800; font-size:13px;
    letter-spacing:.1em; text-transform:uppercase; color:var(--tx);
  }
  header .sub{ font-size:12px; color:var(--tx-dim); letter-spacing:.04em; }
  main{ flex:1; display:flex; align-items:center; justify-content:center; padding:8px 20px; min-height:0; }
  #stage{ position:relative; width:min(82vmin,720px); aspect-ratio:1/1; }
  svg{ width:100%; height:100%; display:block; overflow:visible; }

  /* caption */
  #caption{
    position:absolute; left:50%; bottom:-6px; transform:translate(-50%,100%);
    font-family:var(--font-mono); font-size:12.5px; letter-spacing:.02em;
    color:var(--tx-dim); white-space:nowrap; transition:opacity .4s var(--ease);
    text-align:center;
  }
  #caption b{ color:var(--accent); font-weight:700; }

  /* controls */
  #controls{
    display:flex; align-items:center; gap:14px; padding:26px 28px 30px;
    justify-content:center; flex-wrap:wrap;
  }
  button{
    font:inherit; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--tx); background:var(--bg-surface); border:1px solid var(--border-strong);
    border-radius:8px; padding:9px 16px; cursor:pointer; transition:all .16s var(--ease);
  }
  button:hover{ border-color:var(--accent); color:var(--accent); }
  #scrub{ -webkit-appearance:none; appearance:none; width:min(46vw,340px); height:3px;
    background:var(--border-strong); border-radius:3px; outline:none; }
  #scrub::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid var(--bg); }
  #scrub::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:var(--accent);
    cursor:pointer; border:2px solid var(--bg); }
  .seg{ display:flex; align-items:center; gap:8px; font-family:var(--font-mono);
    font-size:11px; color:var(--tx-faint); }
  select{ font:inherit; font-size:11px; background:var(--bg-surface); color:var(--tx-dim);
    border:1px solid var(--border-strong); border-radius:7px; padding:7px 9px; }

  /* ---- CLEAN / RECORD MODE (?clean=1) ---- */
  body.clean{ background:var(--bg); display:block; }
  body.clean header, body.clean #controls{ display:none; }
  body.clean #gfnav{ display:none; }
  body.clean main{ height:100vh; padding:0; }
  body.clean #stage{ width:min(96vmin,1000px); }
  body.clean #caption{ font-size:14px; bottom:-14px; }
  body.clean.wide main{ height:100vh; }
  body.clean.wide #stage{ width:min(70vw,900px); }
</style>
</head>
<body>

  <button class="gf-toggle" id="gfThemeToggle" type="button" aria-label="Switch to light mode">
    <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</nav>
  <header>
    <span class="brand">Gregg Fleishman</span>
    <span class="sub">The Lost Triangle — 1 : √2 : √3 · animated construction</span>
  </header>

  <main>
    <div id="stage">
      <svg id="art" viewBox="0 0 1026 1016" aria-label="Lost Triangle construction">
        <!-- groups are populated by script for clean ordering -->
        <g id="g-circles" fill="none"></g>
        <g id="g-fills"></g>
        <g id="g-square" fill="none"></g>
        <g id="g-blue" fill="none"></g>
        <g id="g-magenta" fill="none"></g>
        <g id="g-labels"></g>
      </svg>
      <div id="caption">&nbsp;</div>
    </div>
  </main>

  <div id="controls">
    <button id="play">Replay</button>
    <button id="pause">Pause</button>
    <div class="seg"><input id="scrub" type="range" min="0" max="1000" value="0" /></div>
    <div class="seg">
      <label for="speed">speed</label>
      <select id="speed">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function(){
  "use strict";
  const SVGNS="http://www.w3.org/2000/svg";

  /* ---------- geometry (measured from lost-triangle-color.png, 1026x1016) ---------- */
  // unit square
  const SQ={ tl:[159,264], tr:[446,264], br:[446,507], bl:[159,507] };
  // three equal construction circles (r ~ 190)
  const CIR=[ {c:[298,387],r:185}, {c:[409,552],r:195}, {c:[703,482],r:193} ];
  // blue √2-fold rhombus + white inner triangle
  const BLUE={ top:[444,351], left:[166,555], bottom:[447,753], right:[725,549] };
  const WHITE=[ [444,351],[166,555],[444,552] ];               // bone half-triangle
  // magenta √3 Lost Triangle + internal divider
  const MAG={ a:[453,360], apex:[848,387], b:[617,715] };
  const MAG_DIV=[ MAG.apex, [535,537] ];                        // apex -> mid of left edge

  const NS=document.getElementById.bind(document);
  const gCir=NS('g-circles'), gFill=NS('g-fills'), gSq=NS('g-square'),
        gBlue=NS('g-blue'), gMag=NS('g-magenta'), gLab=NS('g-labels');

  function el(tag,attrs,parent){ const n=document.createElementNS(SVGNS,tag);
    for(const k in attrs) n.setAttribute(k,attrs[k]); (parent||NS('art')).appendChild(n); return n; }
  function line(a,b,stroke,w,parent,op){ return el('line',
    {x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke,'stroke-width':w,'stroke-linecap':'round',
     'stroke-opacity':(op==null?1:op)},parent); }
  function poly(pts,fill,parent,op){ return el('polygon',
    {points:pts.map(p=>p.join(',')).join(' '),fill,'fill-opacity':(op==null?1:op)},parent); }

  /* ---------- build elements (hidden initial state set later) ---------- */
  // construction circles
  const circleEls = CIR.map(o=> el('circle',
    {cx:o.c[0],cy:o.c[1],r:o.r,stroke:'var(--ring)','stroke-width':2.2,fill:'none'},gCir));

  // unit square: 4 edges + 2 diagonals
  const sqEdges=[ line(SQ.tl,SQ.tr,'var(--geo-unit)',3,gSq),
                  line(SQ.tr,SQ.br,'var(--geo-unit)',3,gSq),
                  line(SQ.br,SQ.bl,'var(--geo-unit)',3,gSq),
                  line(SQ.bl,SQ.tl,'var(--geo-unit)',3,gSq) ];
  const sqDiag=[ line(SQ.tl,SQ.br,'var(--geo-face)',2.4,gSq,.9),
                 line(SQ.tr,SQ.bl,'var(--geo-face)',2.4,gSq,.9) ];

  // blue fold: fill + white half + outline + vertical diagonal
  const blueFill = poly([BLUE.top,BLUE.right,BLUE.bottom,BLUE.left],'var(--geo-face)',gFill,.85);
  const whiteFill= poly(WHITE,'var(--geo-unit)',gFill,1);
  const blueOutline=[ line(BLUE.top,BLUE.right,'var(--geo-unit)',2.2,gBlue,.8),
                      line(BLUE.right,BLUE.bottom,'var(--geo-unit)',2.2,gBlue,.8),
                      line(BLUE.bottom,BLUE.left,'var(--geo-unit)',2.2,gBlue,.8),
                      line(BLUE.left,BLUE.top,'var(--geo-unit)',2.2,gBlue,.8),
                      line(BLUE.top,BLUE.bottom,'var(--geo-unit)',2,gBlue,.6) ];

  // magenta lost triangle: fill + outline + internal divider
  const magFill = poly([MAG.a,MAG.apex,MAG.b],'var(--geo-space)',gFill,.9);
  const magOutline=[ line(MAG.a,MAG.apex,'var(--geo-unit)',2.4,gMag,.85),
                     line(MAG.apex,MAG.b,'var(--geo-unit)',2.4,gMag,.85),
                     line(MAG.b,MAG.a,'var(--geo-unit)',2.4,gMag,.85),
                     line(MAG_DIV[0],MAG_DIV[1],'var(--geo-unit)',1.8,gMag,.6) ];

  // labels (gold/mono)
  function lab(txt,xy,fill,size){ const t=el('text',
    {x:xy[0],y:xy[1],fill,'font-family':'Space Mono, monospace','font-size':size||26,
     'text-anchor':'middle','dominant-baseline':'middle'},gLab); t.textContent=txt; return t; }
  const L1   = lab('1',  [300,238],'var(--geo-unit)',30);
  const Lsq2 = lab('√2', [250,400],'var(--geo-face)',32);
  const Lsq3 = lab('√3', [690,520],'var(--geo-space)',34);

  /* ---------- prep draw/fade state ---------- */
  const drawers=[...circleEls,...sqEdges,...sqDiag,...blueOutline,...magOutline];
  drawers.forEach(n=>{ const L=n.getTotalLength(); n.style.strokeDasharray=L; n.style.strokeDashoffset=L; });
  [blueFill,whiteFill,magFill].forEach(n=> n.setAttribute('fill-opacity',0));
  [L1,Lsq2,Lsq3].forEach(n=> n.setAttribute('opacity',0));

  /* ---------- caption ---------- */
  const cap=NS('caption');
  function setCap(html){ cap.style.opacity=0;
    setTimeout(()=>{ cap.innerHTML=html; cap.style.opacity=1; },180); }

  /* ---------- timeline ---------- */
  const tl=gsap.timeline({paused:true, onUpdate:syncScrub, onComplete:()=>{playBtn.textContent='Replay';}});
  // add a stroke-draw straight onto the timeline (no standalone tween → no flash)
  const draw=(n,d,pos)=> tl.fromTo(n,
    {strokeDashoffset:+n.style.strokeDasharray||n.getTotalLength()},
    {strokeDashoffset:0,duration:d,ease:'power1.inOut'}, pos);

  // 1 — construction circles
  tl.add(()=>setCap('Three construction circles · <b>R = 1 : √2 : √3</b>'),0);
  circleEls.forEach((c,i)=> draw(c,0.7,0.05+i*0.28));

  // 2 — unit square
  tl.add(()=>setCap('The module · <b>unit square, edge = 1</b>'),'>-0.1');
  sqEdges.forEach((e,i)=> draw(e,0.42,'>'+(i?-0.30:0)));
  tl.to(L1,{opacity:1,duration:.4},'>-0.2');

  // 3 — face diagonals √2
  tl.add(()=>setCap('Fold the diagonal · <b>√2 — the face diagonal</b>'),'>-0.05');
  sqDiag.forEach((d,i)=> draw(d,0.55,'>'+(i?-0.45:0)));

  // 4 — blue √2 fold
  tl.add('blue','>-0.1');
  blueOutline.forEach((e,i)=> draw(e,0.4,'blue+='+(i*0.16)));
  tl.to(blueFill,{attr:{'fill-opacity':.85},duration:.8},'blue+=0.3')
    .to(whiteFill,{attr:{'fill-opacity':1},duration:.6},'blue+=0.5')
    .to(Lsq2,{opacity:1,duration:.4},'blue+=0.6');

  // 5 — magenta √3 Lost Triangle
  tl.add('mag','>-0.05');
  tl.add(()=>setCap('Lift one unit · <b>√3 — the cube’s Lost Triangle</b>'),'mag');
  magOutline.forEach((e,i)=> draw(e,0.5,'mag+='+(i*0.2)));
  tl.to(magFill,{attr:{'fill-opacity':.9},duration:1.0},'mag+=0.4')
    .to(Lsq3,{opacity:1,duration:.45},'mag+=0.7');

  // 6 — settle
  tl.add(()=>setCap('<b>1² + 1² = 2</b> &nbsp;·&nbsp; <b>(√2)² + 1² = 3</b> &nbsp;·&nbsp; θ = 35.264°'),'>+0.2');
  tl.to({},{duration:0.8});

  /* ---------- controls ---------- */
  const playBtn=NS('play'), pauseBtn=NS('pause'), scrub=NS('scrub'), speed=NS('speed');
  let scrubbing=false;
  function syncScrub(){ if(!scrubbing) scrub.value=Math.round(tl.progress()*1000); }
  playBtn.onclick=()=>{ if(tl.progress()===1||tl.progress()===0){ tl.restart(); }
    else tl.play(); playBtn.textContent='Replay'; pauseBtn.textContent='Pause'; };
  pauseBtn.onclick=()=>{ if(tl.paused()){ tl.play(); pauseBtn.textContent='Pause'; }
    else { tl.pause(); pauseBtn.textContent='Resume'; } };
  scrub.addEventListener('input',()=>{ scrubbing=true; tl.pause(); tl.progress(scrub.value/1000);
    pauseBtn.textContent='Resume'; });
  scrub.addEventListener('change',()=>{ scrubbing=false; });
  speed.onchange=()=> tl.timeScale(+speed.value);

  /* ---------- clean / record mode ---------- */
  const q=new URLSearchParams(location.search);
  if(q.get('clean')==='1'){
    document.body.classList.add('clean');
    if(q.get('format')==='wide') document.body.classList.add('wide');
  }
  // autoplay
  const start=()=> tl.timeScale(+speed.value).play();
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(start,250)); }
  else setTimeout(start,400);
})();
</script>
</body>
</html>
