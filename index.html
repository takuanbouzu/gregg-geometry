<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#080c12"/>
<title>Gregg Fleishman — The Geometry Lesson</title>

<style>
:root{
  --bg-top:#0d1726; --bg-mid:#0a0f18; --bg-bot:#05080e;
  --panel:rgba(10,15,24,.72); --panel-bd:rgba(255,255,255,.12);
  --tx:rgba(255,255,255,.92); --tx-dim:rgba(255,255,255,.46); --tx-faint:rgba(255,255,255,.26);
  --chip:rgba(255,255,255,.08); --accent:#4d88ff;
  --font:Inter,-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Arial,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;color:var(--tx);}
#bg{position:fixed;inset:0;z-index:-1;transition:background .6s ease;
  background:radial-gradient(circle at 50% 32%,var(--bg-top) 0%,var(--bg-mid) 52%,var(--bg-bot) 100%);}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;touch-action:none;}
#infobox{position:fixed;z-index:50;display:none;max-width:250px;background:var(--panel);border:.5px solid var(--panel-bd);border-radius:12px;padding:11px 13px;-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);box-shadow:0 12px 34px rgba(0,0,0,.34);pointer-events:auto;}
#infobox .it{font-size:12.5px;font-weight:600;color:var(--tx);margin-bottom:5px;letter-spacing:-.01em;}
#infobox .ib{font-size:12px;line-height:1.5;color:var(--tx-dim);}

/* ---- shared site nav ---- */
#gfnav{position:fixed;top:0;left:0;right:0;z-index:70;min-height:46px;display:flex;justify-content:center;align-items:center;gap:8px;padding:7px 16px;background:rgba(8,12,18,.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:.5px solid rgba(255,255,255,.09);}
#gfnav span{font-size:11px;font-weight:500;color:rgba(255,255,255,.38);letter-spacing:.08em;text-transform:uppercase;margin-right:4px;white-space:nowrap;}
#gfnav a{font-size:12px;font-weight:500;text-decoration:none;padding:5px 12px;border-radius:18px;transition:all .18s;white-space:nowrap;}
#gfnav a.active{background:rgba(255,255,255,.13);color:rgba(255,255,255,.92);border:.5px solid rgba(255,255,255,.24);}
#gfnav a.inactive{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);border:.5px solid rgba(255,255,255,.12);}
#gfnav a:hover{color:rgba(255,255,255,.92);background:rgba(255,255,255,.12);}

/* ---- top bar ---- */
#top{position:fixed;top:46px;left:0;right:0;z-index:40;height:52px;display:flex;align-items:center;
  gap:14px;padding:0 16px;background:linear-gradient(to bottom,rgba(0,0,0,.42),rgba(0,0,0,0));}
#brand{font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--tx-dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#brand b{color:var(--tx);font-weight:600;}
#gear{margin-left:auto;display:flex;align-items:center;gap:7px;font:inherit;font-size:12px;font-weight:500;
  color:var(--tx-dim);background:var(--chip);border:.5px solid var(--panel-bd);border-radius:18px;
  padding:7px 13px;cursor:pointer;transition:all .2s;flex-shrink:0;}
#gear:hover,#gear.open{color:var(--tx);background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);}
#gear svg{display:block;}

/* ---- settings dropdown ---- */
#settings{position:fixed;top:96px;right:16px;z-index:45;width:236px;background:var(--panel);
  border:.5px solid var(--panel-bd);border-radius:15px;padding:15px 16px;
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 14px 40px rgba(0,0,0,.32);
  opacity:0;transform:translateY(-8px) scale(.98);transform-origin:top right;pointer-events:none;transition:all .2s ease;}
#settings.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
#settings h4{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx-faint);margin:0 0 9px;}
#settings .grp+ .grp{margin-top:15px;padding-top:14px;border-top:.5px solid var(--panel-bd);}
.opt{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;}
.opt .rad{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--panel-bd);flex-shrink:0;position:relative;transition:all .18s;}
.opt.on .rad{border-color:var(--accent);}
.opt.on .rad:after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent);}
.opt .txt{font-size:13px;color:var(--tx-dim);}
.opt.on .txt{color:var(--tx);}
.opt .sub{display:block;font-size:10.5px;color:var(--tx-faint);margin-top:1px;}
.srow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px;}
.srow label{font-size:12.5px;color:var(--tx-dim);}
#sketchOp{width:108px;accent-color:var(--accent);}
.sw{position:relative;width:38px;height:21px;border-radius:11px;background:var(--chip);border:.5px solid var(--panel-bd);cursor:pointer;transition:background .2s;flex-shrink:0;}
.sw.on{background:var(--accent);border-color:var(--accent);}
.sw .kn{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:left .2s;}
.sw.on .kn{left:20px;}

/* ---- stage caption (center top) ---- */
#cap{position:fixed;top:108px;left:50%;transform:translateX(-50%);z-index:25;text-align:center;
  pointer-events:none;max-width:min(620px,86vw);transition:opacity .5s ease;}
#capnum{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;}
#captitle{font-size:clamp(17px,4.4vw,23px);font-weight:600;letter-spacing:-.01em;margin-top:3px;}
#capbody{font-size:clamp(12px,3vw,13.5px);line-height:1.5;color:var(--tx-dim);margin-top:7px;}
#capconf{display:inline-block;margin-top:9px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:11px;border:.5px solid var(--panel-bd);background:var(--chip);color:var(--tx-faint);}
.conf-confirmed{color:#5fd39a!important;border-color:rgba(95,211,154,.4)!important;}
.conf-interp{color:#ffc861!important;border-color:rgba(255,200,97,.4)!important;}
.conf-hyp{color:#ff8aa8!important;border-color:rgba(255,138,168,.4)!important;}
body.minimal #capbody,body.minimal #brand{display:none;}

/* ---- left toggle panel ---- */
#layers{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:25;width:188px;max-height:74vh;overflow-y:auto;
  background:var(--panel);border:.5px solid var(--panel-bd);border-radius:15px;padding:13px 14px;
  -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);transition:opacity .3s;}
#layers h4{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx-faint);margin-bottom:9px;}
.lyr{display:flex;align-items:center;gap:9px;padding:5px 0;cursor:pointer;}
.lyr .box{width:15px;height:15px;border-radius:4px;border:1px solid var(--panel-bd);background:var(--chip);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.lyr.on .box{background:var(--accent);border-color:var(--accent);}
.lyr .box svg{opacity:0;transition:opacity .18s;}
.lyr.on .box svg{opacity:1;}
.lyr span{font-size:12.5px;color:var(--tx-dim);transition:color .18s;}
.lyr.on span{color:var(--tx);}
.lyr.disabled{opacity:.32;pointer-events:none;}

/* ---- bottom stage rail ---- */
#rail{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:25;display:flex;align-items:center;
  gap:4px;background:var(--panel);border:.5px solid var(--panel-bd);border-radius:30px;padding:7px 9px;
  -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);max-width:94vw;}
#rail button{font:inherit;width:34px;height:34px;border-radius:50%;border:.5px solid var(--panel-bd);
  background:var(--chip);color:var(--tx-dim);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
#rail button:hover{color:var(--tx);}
.dot{width:9px;height:9px;border-radius:50%;border:1px solid var(--tx-faint);cursor:pointer;transition:all .2s;margin:0 2px;flex-shrink:0;}
.dot.on{background:var(--accent);border-color:var(--accent);transform:scale(1.25);}
#stagelabel{font-size:11px;color:var(--tx-dim);min-width:104px;text-align:center;letter-spacing:.02em;padding:0 6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ---- hint ---- */
#hint{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);z-index:20;font-size:11.5px;
  color:var(--tx-faint);letter-spacing:.04em;transition:opacity .8s ease;pointer-events:none;text-align:center;}
#hint.gone{opacity:0;}

/* ---- responsive ---- */
@media(max-width:720px){
  #gfnav{justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-left:10px;padding-right:10px;}
  #gfnav span{font-size:10px;}
  #gfnav a{font-size:11px;padding:5px 10px;}
  #layers{width:150px;left:10px;padding:11px 11px;}
  #cap{top:102px;}
  #stagelabel{min-width:70px;font-size:10px;}
  #brand{font-size:10px;letter-spacing:.08em;}
  #rail{gap:3px;padding:6px 8px;bottom:calc(16px + env(safe-area-inset-bottom));}
  #rail button{width:30px;height:30px;font-size:14px;}
  .dot{width:8px;height:8px;margin:0 1px;}
}
@media(max-height:560px){
  #cap{top:96px;}
  #capbody{display:none;}
  #layers{max-height:80vh;top:52%;}
  #hint{display:none;}
}
@media(max-width:430px){
  #cap{top:98px;max-width:92vw;}
  #captitle{font-size:18px;}
  #capbody{font-size:11.5px;line-height:1.45;margin-top:5px;}
  #layers{top:auto;bottom:78px;transform:none;max-height:38vh;width:140px;padding:10px 11px;}
  #layers h4{margin-bottom:6px;}
  .lyr{padding:4px 0;}
  #hint{bottom:60px;font-size:10.5px;}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

/* ════════ THEMES ════════ */
const THEMES = {
  night:{ label:'Gregg Night', sub:'Dark · glowing geometry',
    bg:['#0d1726','#0a0f18','#05080e'], fog:0x080c12, fogD:0.052,
    grid:0x16263c, ghost:0x33507a, ink:0xdce6f5,
    unit:0x4d88ff, face:0xff8c3a, space:0xff3366, tri:0x3effa0, angle:0xffcc55,
    xA:0xff5555, yA:0x55ff77, zA:0x4d88ff, sketch:0.62, minimal:false },
  paper:{ label:'Paper Sketch', sub:'Off-white · pencil feel',
    bg:['#fffaf0','#f6f2e8','#e7ddca'], fog:0xefe9da, fogD:0.040,
    grid:0xd9d2c3, ghost:0x9c9484, ink:0x1b1b1b,
    unit:0x1769ff, face:0xe2811f, space:0xd9295f, tri:0x1f9c63, angle:0x927400,
    xA:0xd9295f, yA:0x1f9c63, zA:0x1769ff, sketch:0.80, minimal:false },
  present:{ label:'Presentation', sub:'Minimal · gallery display',
    bg:['#10131a','#0a0c11','#050608'], fog:0x080a0e, fogD:0.045,
    grid:0x1b1f29, ghost:0x46506a, ink:0xeef2f8,
    unit:0x7aa8ff, face:0xffb070, space:0xff6f90, tri:0x6cffb6, angle:0xffd87a,
    xA:0xff7a7a, yA:0x7aff9a, zA:0x7aa8ff, sketch:0.5, minimal:true }
};
let theme=THEMES.night, themeName='night';

/* ════════ RENDERER / SCENE ════════ */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0,0);
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(theme.fog,theme.fogD);
const camera=new THREE.PerspectiveCamera(46,1,0.01,100);
camera.up.set(0,0,1); // Z up throughout

/* responsive framing: keep the figure fully in-frame at any aspect */
let fitDist=4.0;
function resize(){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  renderer.setSize(w,h,false);
  const aspect=w/h; camera.aspect=aspect; camera.updateProjectionMatrix();
  const R0=1.4; // bounding radius around lookAt that must stay visible
  const halfV=THREE.MathUtils.degToRad(camera.fov/2);
  const halfH=Math.atan(Math.tan(halfV)*aspect);
  fitDist=Math.max(R0/Math.sin(halfV), R0/Math.sin(halfH))+0.2;
}
new ResizeObserver(resize).observe(canvas);
window.addEventListener('orientationchange',function(){setTimeout(resize,180);});
resize();

scene.add(new THREE.AmbientLight(0xffffff,.75));
const dir=new THREE.DirectionalLight(0xffffff,.6);dir.position.set(-2,-3,5);scene.add(dir);

/* ════════ POINTS (Z up) ════════ */
const O=new THREE.Vector3(0,0,0), X=new THREE.Vector3(1,0,0), Y=new THREE.Vector3(0,1,0),
      A=new THREE.Vector3(1,1,0), B=new THREE.Vector3(1,1,1),
      Z0=new THREE.Vector3(0,0,1), X1=new THREE.Vector3(1,0,1), Y1=new THREE.Vector3(0,1,1);

/* ════════ REGISTRIES ════════ */
const items=[], labels=[], colorRoles=[], glowMats=[];
function colMat(role,overlay){
  const m=new THREE.LineBasicMaterial({color:theme[role],transparent:true,opacity:0});
  if(overlay){m.depthTest=false;m.depthWrite=false;}
  colorRoles.push({mat:m,role});return m;
}
function reg(obj,opt){
  obj.userData={stage:opt.stage||1,layer:opt.layer||'construction',maxOp:opt.maxOp==null?1:opt.maxOp,grow:!!opt.grow,always:!!opt.always,maxStage:opt.maxStage==null?null:opt.maxStage,desc:opt.desc||null};
  if(opt.grow){obj.userData.a=opt.a.clone();obj.userData.b=opt.b.clone();obj.userData.prog=0;}
  if(opt.overlay)obj.renderOrder=opt.overlayOrder||2;
  items.push(obj);scene.add(obj);return obj;
}
function line(a,b,role,opt){opt=opt||{};
  const pts=opt.grow?[a.clone(),a.clone()]:[a.clone(),b.clone()];
  const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),colMat(role,opt.overlay));
  return reg(ln,Object.assign({a,b,role},opt));
}
/* neon glow line — additive core tube + soft halo tube (James-Turrell luminous light) */
const _Y=new THREE.Vector3(0,1,0);
function setSeg(grp,a,end){
  const dir=end.clone().sub(a);const len=dir.length();
  if(len<1e-5){grp.visible=false;return;}grp.visible=true;
  grp.position.copy(a).addScaledVector(dir,0.5);
  grp.quaternion.setFromUnitVectors(_Y,dir.multiplyScalar(1/len));
  grp.scale.set(1,len,1);
}
function glow(a,b,role,opt){opt=opt||{};
  const coreR=opt.coreR||0.013, haloR=opt.haloR||0.05;
  const cMat=new THREE.MeshBasicMaterial({color:theme[role],transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
  const hMat=new THREE.MeshBasicMaterial({color:theme[role],transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending});
  const core=new THREE.Mesh(new THREE.CylinderGeometry(coreR,coreR,1,8,1,true),cMat);core.renderOrder=4;
  const halo=new THREE.Mesh(new THREE.CylinderGeometry(haloR,haloR,1,12,1,true),hMat);halo.renderOrder=3;
  const grp=new THREE.Group();grp.add(halo);grp.add(core);
  colorRoles.push({mat:cMat,role});colorRoles.push({mat:hMat,role});glowMats.push({core:cMat,halo:hMat});
  setSeg(grp,a,opt.grow?a:b);
  grp.userData={isGlow:true,core:cMat,halo:hMat,a:a.clone(),b:b.clone(),
    stage:opt.stage||1,layer:opt.layer||'construction',maxOp:opt.maxOp==null?1:opt.maxOp,
    grow:!!opt.grow,prog:0,always:!!opt.always,maxStage:opt.maxStage==null?null:opt.maxStage,
    haloFactor:opt.haloFactor==null?0.32:opt.haloFactor};
  items.push(grp);scene.add(grp);return grp;
}
function dot(p,role,r,opt){opt=opt||{};
  const mat=new THREE.MeshBasicMaterial({color:theme[role],transparent:true,opacity:0});
  if(opt.overlay){mat.depthTest=false;mat.depthWrite=false;}
  colorRoles.push({mat,role});
  const m=new THREE.Mesh(new THREE.SphereGeometry(r||.026,18,18),mat);m.position.copy(p);
  return reg(m,opt);
}
function triFill(a,b,c,role,opt){opt=opt||{};
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([a.x,a.y,a.z,b.x,b.y,b.z,c.x,c.y,c.z]),3));
  g.setIndex([0,1,2]);g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:theme[role],transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false}));
  colorRoles.push({mat:m.material,role});return reg(m,Object.assign({role},opt));
}
function arc(center,u,v,r,a0,a1,role,opt){opt=opt||{};const pts=[];const segs=44;
  for(let i=0;i<=segs;i++){const a=a0+(a1-a0)*i/segs;
    pts.push(center.clone().add(u.clone().multiplyScalar(Math.cos(a)*r)).add(v.clone().multiplyScalar(Math.sin(a)*r)));}
  const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),colMat(role,opt.overlay));
  return reg(ln,Object.assign({role},opt));
}
function label(text,pos,role,scale,opt){opt=opt||{};
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true,depthTest:false,opacity:0}));
  sp.position.copy(pos);sp.renderOrder=5;
  const rec={sprite:sp,text:text,role:role,scale:scale,stage:opt.stage||1,layer:opt.layer||'labels',maxOp:opt.maxOp==null?1:opt.maxOp,always:!!opt.always,maxStage:opt.maxStage==null?null:opt.maxStage};
  labels.push(rec);drawLabel(rec);scene.add(sp);return rec;
}
function drawLabel(rec){
  const cv=document.createElement('canvas');cv.width=512;cv.height=160;
  const ctx=cv.getContext('2d');ctx.font='700 78px Inter,Arial,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const col=(rec.role==='ink')?theme.ink:theme[rec.role];
  const hex='#'+(col>>>0).toString(16).padStart(6,'0').slice(-6);
  ctx.lineWidth=12;ctx.strokeStyle=(themeName==='paper')?'rgba(246,242,232,.95)':'rgba(8,12,18,.8)';
  ctx.strokeText(rec.text,256,80);ctx.fillStyle=hex;ctx.fillText(rec.text,256,80);
  const tex=new THREE.CanvasTexture(cv);tex.needsUpdate=true;
  if(rec.sprite.material.map)rec.sprite.material.map.dispose();
  rec.sprite.material.map=tex;rec.sprite.scale.set(rec.scale*3.2,rec.scale,1);
}

/* ---- STAGE 8 — RHOMBIC DODECAHEDRON (cube → Rhombicube morph) ---- */
const _ax6=[new THREE.Vector3(1,0,0),new THREE.Vector3(-1,0,0),new THREE.Vector3(0,1,0),new THREE.Vector3(0,-1,0),new THREE.Vector3(0,0,1),new THREE.Vector3(0,0,-1)];
const rdPairs=[];
for(let i=0;i<6;i++)for(let j=i+1;j<6;j++) if(Math.abs(_ax6[i].dot(_ax6[j]))<0.5) rdPairs.push([_ax6[i],_ax6[j]]);
function rdQuad(a,b,grow,ctr){
  const t=new THREE.Vector3().crossVectors(a,b).normalize();
  const apexA=ctr.clone().addScaledVector(a,0.5+0.5*grow);
  const apexB=ctr.clone().addScaledVector(b,0.5+0.5*grow);
  const base=ctr.clone().addScaledVector(a,0.5).addScaledVector(b,0.5);
  return [apexA, base.clone().addScaledVector(t,0.5), apexB, base.clone().addScaledVector(t,-0.5)];
}
let rd=null;
(function(){
  const fGeo=new THREE.BufferGeometry();
  const fPos=new Float32Array(rdPairs.length*6*3);
  fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
  const fMat=new THREE.MeshBasicMaterial({color:theme.space,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
  colorRoles.push({mat:fMat,role:'space'});
  const fMesh=new THREE.Mesh(fGeo,fMat);fMesh.renderOrder=1;
  fMesh.userData={custom:true,desc:{t:'Silver rhombus face',b:'12 identical rhombi, diagonal ratio 1:√2, face angles 70.5° and 109.5°, dihedral 120°. The Catalan dual of the cuboctahedron and the Voronoi cell of the FCC lattice.'}};
  items.push(fMesh);scene.add(fMesh);
  const eGeo=new THREE.BufferGeometry();
  const ePos=new Float32Array(rdPairs.length*8*3);
  eGeo.setAttribute('position',new THREE.BufferAttribute(ePos,3));
  const eMat=new THREE.LineBasicMaterial({color:theme.unit,transparent:true,opacity:0});
  colorRoles.push({mat:eMat,role:'unit'});
  scene.add(new THREE.LineSegments(eGeo,eMat));
  rd={fGeo:fGeo,fPos:fPos,fMat:fMat,eGeo:eGeo,ePos:ePos,eMat:eMat,grow:0};
  updaters.push(function(){
    rd.grow+=((stage>=8?1:0)-rd.grow)*0.05;
    const fp=rd.fPos, ep=rd.ePos; let fi=0, ei=0;
    for(let k=0;k<rdPairs.length;k++){
      const q=rdQuad(rdPairs[k][0],rdPairs[k][1],rd.grow,CC);
      const tri=[q[0],q[1],q[2],q[0],q[2],q[3]];
      for(let v=0;v<6;v++){fp[fi++]=tri[v].x;fp[fi++]=tri[v].y;fp[fi++]=tri[v].z;}
      const e=[q[0],q[1],q[1],q[2],q[2],q[3],q[3],q[0]];
      for(let v=0;v<8;v++){ep[ei++]=e[v].x;ep[ei++]=e[v].y;ep[ei++]=e[v].z;}
    }
    rd.fGeo.attributes.position.needsUpdate=true;
    rd.eGeo.attributes.position.needsUpdate=true;
    const show=(stage>=8)&&layerOn.rhombic;
    rd.fMat.opacity+=((show?0.16:0)-rd.fMat.opacity)*0.1;
    rd.eMat.opacity+=((show?0.85:0)-rd.eMat.opacity)*0.1;
  });

  label('70.5°',new THREE.Vector3(0.5,0.5,1.66),'angle',.12,{stage:8,layer:'rhombic'});
  label('120° dihedral',new THREE.Vector3(1.18,1.18,1.18),'angle',.12,{stage:8,layer:'rhombic'});
})();

let stage=1;
const capnum=document.getElementById('capnum'),captitle=document.getElementById('captitle'),
      capbody=document.getElementById('capbody'),capconf=document.getElementById('capconf'),
      stagelabel=document.getElementById('stagelabel');
const dots=document.getElementById('dots');
STAGES.forEach(function(s){const d=document.createElement('div');d.className='dot';d.onclick=function(){setStage(s.n);};dots.appendChild(d);});

let camTgt={az:-1.55,el:1.28,r:4.3}, camCur={az:-1.55,el:1.28,r:4.3};
const lookAt=new THREE.Vector3(0.5,0.5,0.32);
let userInteracted=false, autoRotate=true;

function setStage(n){
  n=Math.max(1,Math.min(STAGES.length,n));stage=n;userInteracted=false;
  const s=STAGES[n-1];
  capnum.textContent='Stage '+n;captitle.textContent=s.title;capbody.textContent=s.body;
  capconf.textContent=s.confTxt;capconf.className='conf-'+(s.conf==='confirmed'?'confirmed':s.conf==='interp'?'interp':'hyp');
  stagelabel.textContent=n+' / '+STAGES.length;
  camTgt={az:s.cam.az,el:s.cam.el,r:s.cam.r};
  items.forEach(function(it){if(it.userData.grow&&it.userData.stage===n)it.userData.prog=0;});
  Array.from(dots.children).forEach(function(d,i){d.classList.toggle('on',i===n-1);});
  const avail={sketch:1,construction:2,labels:2,ratios:2,angles:2,cube:3,roottri:4,rhombic:8,dihedral:9,arch:9,axes:5};
  LAYERS.forEach(function(l){layerEls[l.key].classList.toggle('disabled',stage<avail[l.key]);});
}
document.getElementById('next').onclick=function(){setStage(stage+1);};
document.getElementById('prev').onclick=function(){setStage(stage-1);};

/* ════════ THEME SWITCH ════════ */
function applyTheme(name){
  themeName=name;theme=THEMES[name];
  Object.keys(THEMES).forEach(function(k){if(THEMES[k]._el)THEMES[k]._el.classList.toggle('on',k===name);});
  document.body.classList.toggle('minimal',!!theme.minimal);
  document.body.classList.toggle('paper',name==='paper');
  glowMats.forEach(function(g){const bl=(name!=='paper')?THREE.AdditiveBlending:THREE.NormalBlending;g.core.blending=bl;g.halo.blending=bl;g.core.needsUpdate=true;g.halo.needsUpdate=true;});
  const bg=document.getElementById('bg');
  bg.style.background='radial-gradient(circle at 50% 32%,'+theme.bg[0]+' 0%,'+theme.bg[1]+' 52%,'+theme.bg[2]+' 100%)';
  document.querySelector('meta[name=theme-color]').setAttribute('content',theme.bg[1]);
  scene.fog.color.setHex(theme.fog);scene.fog.density=theme.fogD;
  colorRoles.forEach(function(c){if(c.mat)c.mat.color.setHex(theme[c.role]);});
  labels.forEach(drawLabel);
  const r=document.documentElement.style;
  if(name==='paper'){
    r.setProperty('--panel','rgba(255,250,240,.84)');r.setProperty('--panel-bd','rgba(20,20,20,.14)');
    r.setProperty('--tx','rgba(20,20,20,.92)');r.setProperty('--tx-dim','rgba(20,20,20,.55)');
    r.setProperty('--tx-faint','rgba(20,20,20,.34)');r.setProperty('--chip','rgba(20,20,20,.05)');r.setProperty('--accent','#1769ff');
  }else{
    r.setProperty('--panel','rgba(10,15,24,.74)');r.setProperty('--panel-bd','rgba(255,255,255,.12)');
    r.setProperty('--tx','rgba(255,255,255,.92)');r.setProperty('--tx-dim','rgba(255,255,255,.46)');
    r.setProperty('--tx-faint','rgba(255,255,255,.26)');r.setProperty('--chip','rgba(255,255,255,.08)');
    r.setProperty('--accent',name==='present'?'#7aa8ff':'#4d88ff');
  }
}

/* ════════ SETTINGS CONTROLS ════════ */
document.getElementById('sketchOp').oninput=function(e){sketchUserOp=e.target.value/100;};
const autoBtn=document.getElementById('autorot');
autoBtn.onclick=function(){autoRotate=!autoRotate;autoBtn.classList.toggle('on',autoRotate);if(autoRotate)userInteracted=false;};

/* ════════ INPUT ════════ */
let drag=false,px=0,py=0;const hintEl=document.getElementById('hint');
function killHint(){hintEl.classList.add('gone');}
canvas.addEventListener('mousedown',function(e){drag=true;px=e.clientX;py=e.clientY;userInteracted=true;killHint();});
window.addEventListener('mouseup',function(){drag=false;});
window.addEventListener('mousemove',function(e){if(!drag)return;
  camTgt.az-=(e.clientX-px)*.008;camTgt.el=Math.max(.08,Math.min(1.4,camTgt.el+(e.clientY-py)*.006));
  px=e.clientX;py=e.clientY;});
canvas.addEventListener('wheel',function(e){camTgt.r=Math.max(2.0,Math.min(8,camTgt.r+e.deltaY*.005));userInteracted=true;killHint();},{passive:true});
let pinch=null;
canvas.addEventListener('touchstart',function(e){const t=e.touches[0];drag=true;px=t.clientX;py=t.clientY;userInteracted=true;killHint();
  if(e.touches.length>=2)pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
canvas.addEventListener('touchmove',function(e){if(!drag)return;const t=e.touches[0];
  if(e.touches.length===1){camTgt.az-=(t.clientX-px)*.008;camTgt.el=Math.max(.08,Math.min(1.4,camTgt.el+(t.clientY-py)*.006));}
  if(e.touches.length>=2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch!=null)camTgt.r=Math.max(2.0,Math.min(8,camTgt.r-(d-pinch)*.012));pinch=d;}
  px=t.clientX;py=t.clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',function(e){if(e.touches.length===0){drag=false;pinch=null;}},{passive:false});

/* ════════ HOVER DESCRIPTION BOX (opens on hover · closes on click-outside or Esc) ════════ */
const infobox=document.getElementById('infobox');
const ray=new THREE.Raycaster();ray.params.Line.threshold=0.045;
const ndc=new THREE.Vector2();
let infoObj=null, infoOn=false;
function showInfo(d,x,y){
  infobox.querySelector('.it').textContent=d.t;
  infobox.querySelector('.ib').textContent=d.b;
  infobox.style.display='block';
  const bw=infobox.offsetWidth, bh=infobox.offsetHeight;
  let px=x+16, py=y+16;
  if(px+bw>window.innerWidth-8)px=x-bw-16;
  if(py+bh>window.innerHeight-8)py=window.innerHeight-bh-8;
  if(px<8)px=8; if(py<8)py=8;
  infobox.style.left=px+'px';infobox.style.top=py+'px';infoOn=true;
}
function hideInfo(){infobox.style.display='none';infoOn=false;}
function hoverPick(x,y){
  ndc.x=(x/window.innerWidth)*2-1; ndc.y=-(y/window.innerHeight)*2+1;
  ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(items,true);
  let obj=null;
  for(let i=0;i<hits.length;i++){
    let o=hits[i].object;
    while(o&&!(o.userData&&o.userData.desc))o=o.parent;
    if(o&&o.userData&&o.userData.desc){const vis=o.material?o.material.opacity>0.06:true;if(vis){obj=o;break;}}
  }
  if(obj){if(obj!==infoObj){infoObj=obj;showInfo(obj.userData.desc,x,y);}}
  else infoObj=null;
}
canvas.addEventListener('mousemove',function(e){if(!drag)hoverPick(e.clientX,e.clientY);});
window.addEventListener('mousedown',function(e){if(infoOn&&!infobox.contains(e.target))hideInfo();});
window.addEventListener('keydown',function(e){if(e.key==='Escape')hideInfo();});

/* ════════ ANIMATION ════════ */
function ease(x){x=Math.max(0,Math.min(1,x));return x*x*(3-2*x);}
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  if(autoRotate&&!userInteracted)camTgt.az+=0.0011;
  const k=.06;
  camCur.az+=(camTgt.az-camCur.az)*k;
  camCur.el+=(camTgt.el-camCur.el)*k;
  camCur.r +=(camTgt.r -camCur.r )*k;
  const renderR=Math.max(camCur.r,fitDist); // never let the figure clip the frame
  camera.position.set(
    lookAt.x+renderR*Math.cos(camCur.el)*Math.cos(camCur.az),
    lookAt.y+renderR*Math.cos(camCur.el)*Math.sin(camCur.az),
    lookAt.z+renderR*Math.sin(camCur.el));
  camera.lookAt(lookAt);

  const gWant=(layerOn.construction&&stage>=2)?gridMaxOp:0;
  gridG.children.forEach(function(c){c.material.opacity+=(gWant-c.material.opacity)*.08;});

  items.forEach(function(it){
    const ud=it.userData;
    if(ud.custom)return;
    const inRange=(stage>=ud.stage)&&(ud.maxStage==null||stage<=ud.maxStage);
    let on=ud.always?true:(inRange && layerOn[ud.layer]!==false);
    if(ud.isGlow){
      let end=ud.b;
      if(ud.grow){ud.prog=inRange?Math.min(1,ud.prog+0.022):0;const p=ease(ud.prog);end=ud.a.clone().lerp(ud.b,p);if(p<=0)on=false;}
      setSeg(it,ud.a,end);
      const w=on?ud.maxOp:0;
      ud.core.opacity+=(w-ud.core.opacity)*.1;
      ud.halo.opacity+=(w*ud.haloFactor-ud.halo.opacity)*.1;
      return;
    }
    let want=on?ud.maxOp:0;
    if(ud.isSketch)want=(inRange && layerOn.sketch)?(sketchUserOp*theme.sketch):0;
    if(ud.grow){
      ud.prog=inRange?Math.min(1,ud.prog+0.022):0;
      const p=ease(ud.prog);const end=ud.a.clone().lerp(ud.b,p);
      const arr=it.geometry.attributes.position.array;
      arr[0]=ud.a.x;arr[1]=ud.a.y;arr[2]=ud.a.z;arr[3]=end.x;arr[4]=end.y;arr[5]=end.z;
      it.geometry.attributes.position.needsUpdate=true;
      if(p<=0)want=0;
    }
    if(it.material)it.material.opacity+=(want-it.material.opacity)*.1;
  });

  if(originRing){const s=1+Math.sin(t*1.5)*0.07;originRing.scale.set(s,s,s);originRing.material.opacity=0.34+Math.sin(t*1.5)*0.12;}
  for(let u=0;u<updaters.length;u++)updaters[u](t);

  labels.forEach(function(rec){
    const vis=rec.always || (stage>=rec.stage && (rec.maxStage==null||stage<=rec.maxStage) && layerOn[rec.layer]!==false && !(theme.minimal && rec.layer==='labels' && rec.text.length>2));
    const want=vis?rec.maxOp:0;
    rec.sprite.material.opacity+=(want-rec.sprite.material.opacity)*.1;
    rec.sprite.visible=rec.sprite.material.opacity>.01;
  });

  renderer.render(scene,camera);
}

/* ════════ INIT ════════ */
applyTheme('night');
setStage(1);
animate();

})();
